services:

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: laravel_app

    working_dir: /var/www

    volumes:
      - ./:/var/www

  nginx:
    image: nginx:latest

    container_name: laravel_nginx

    ports:
      - "80:80"

    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app